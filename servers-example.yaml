#    host: "your.server.ip.or.hostname"
#    port: 28015
#    type: rust
#    password: ""
#
#  - label: "Custom Steam Game"
#    host: "your.server.ip.or.hostname"
#    port: 27015
#    type: steam
#    appid: 12345
#    password: ""
