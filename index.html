<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Watcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      -webkit-app-region: drag;
      gap: 14px;
    }
    header * { -webkit-app-region: no-drag; }

    .app-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #0f172a;
      flex-shrink: 0;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    #summary { font-size: 13px; color: #64748b; }
    #summary .count-online { color: #16a34a; font-weight: 600; }

    #poll-label { font-size: 12px; color: #94a3b8; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn:hover:not(:disabled) { background: #e2e8f0; color: #1e293b; border-color: #cbd5e1; }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .btn-primary {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #16a34a;
    }
    .btn-primary:hover:not(:disabled) {
      background: #dcfce7;
      border-color: #86efac;
      color: #15803d;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* ── Scroll area ─────────────────────────────────────────────────────── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
    }
    main::-webkit-scrollbar       { width: 7px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* ── Server list ─────────────────────────────────────────────────────── */
    #servers-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── State blocks ────────────────────────────────────────────────────── */
    .state-block {
      text-align: center;
      color: #94a3b8;
      padding: 60px 20px;
    }
    .state-block h2 { font-size: 17px; color: #64748b; margin-bottom: 8px; }
    .state-block p  { font-size: 13px; line-height: 1.6; }
    .state-block code {
      background: #e2e8f0;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12px;
      color: #7c3aed;
    }

    .error-block {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 16px 20px;
      color: #b91c1c;
    }
    .error-block strong { display: block; margin-bottom: 6px; font-size: 13px; color: #991b1b; }
    .error-block pre {
      font-size: 12px;
      color: #dc2626;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Cascadia Mono', 'Consolas', monospace;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .blink { animation: blink 1.6s ease-in-out infinite; }

    /* ── Server card ─────────────────────────────────────────────────────── */
    .server-card {
      background: #ffffff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      box-shadow: 0 1px 3px #0000000a;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .server-card.online  { border-color: #bbf7d0; box-shadow: 0 1px 4px #16a34a14; }
    .server-card.offline { border-color: #fecaca; box-shadow: 0 1px 4px #dc262614; }
    .server-card.pending { border-color: #e2e8f0; }

    .status-bar { height: 3px; }
    .online  .status-bar { background: #16a34a; }
    .offline .status-bar { background: #dc2626; }
    .pending .status-bar { background: #e2e8f0; }

    .card-body { padding: 11px 15px 10px; }

    /* ── Top row ─────────────────────────────────────────────────────────── */
    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .online  .dot { background: #16a34a; box-shadow: 0 0 0 2px #bbf7d060; }
    .offline .dot { background: #dc2626; box-shadow: 0 0 0 2px #fecaca60; }
    .pending .dot { background: #cbd5e1; }

    .server-label {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .player-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .online .player-badge  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .offline .player-badge { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; font-size: 10px; letter-spacing: 0.5px; }
    .pending .player-badge { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; font-size: 10px; }

    /* Join button */
    .join-btn {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      padding: 3px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .join-btn:hover { background: #dcfce7; border-color: #86efac; color: #15803d; }

    .server-browser-note {
      font-size: 11px;
      color: #94a3b8;
      font-style: italic;
    }

    .offline .join-btn,
    .pending .join-btn {
      background: #f8fafc;
      border-color: #e2e8f0;
      color: #94a3b8;
      cursor: default;
      pointer-events: none;
    }

    /* ── Sub-row: real name, map, ping ───────────────────────────────────── */
    .card-sub {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 18px;
      margin-bottom: 9px;
      flex-wrap: wrap;
    }

    .card-sub-name {
      font-size: 11px;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 320px;
    }

    .tag {
      font-size: 11px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 1px 7px;
      border-radius: 4px;
      color: #64748b;
      white-space: nowrap;
    }
    .tag.ping-good { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .tag.ping-ok   { color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .tag.ping-bad  { color: #dc2626; background: #fef2f2; border-color: #fecaca; }

    /* ── Player list ─────────────────────────────────────────────────────── */
    .players-section { padding-left: 18px; }

    .players-heading {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .player-chips { display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      font-size: 12px;
      color: #334155;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .no-players { font-size: 12px; color: #94a3b8; font-style: italic; }

    /* Pending / retry status lines */
    .status-note {
      font-size: 12px;
      font-style: italic;
      padding-left: 18px;
      margin-top: 2px;
    }
    .status-note.muted     { color: #94a3b8; }
    .status-note.countdown { color: #d97706; }
    .status-note.retrying  { color: #64748b; }

    /* Expandable error block */
    .error-details { padding-left: 18px; }

    .error-details summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      width: fit-content;
    }
    .error-details summary::-webkit-details-marker { display: none; }

    .error-summary {
      font-size: 12px;
      color: #dc2626;
      font-style: italic;
    }

    .error-details summary::before {
      content: '▶';
      font-size: 9px;
      color: #dc2626;
      opacity: 0.6;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .error-details[open] summary::before { transform: rotate(90deg); }

    .error-detail-body {
      margin-top: 7px;
      padding: 8px 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 11px;
      color: #7f1d1d;
      font-family: 'Cascadia Mono', 'Consolas', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    /* ── Card footer ─────────────────────────────────────────────────────── */
    .card-footer {
      font-size: 11px;
      color: #cbd5e1;
      margin-top: 9px;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <span class="app-title">Server Watcher</span>
    <div class="header-center">
      <span id="summary"></span>
      <span id="poll-label"></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="refresh-btn">Refresh</button>
      <button class="btn" id="test-notify-btn">Test Notification</button>
      <button class="btn" id="reload-btn">Reload Config</button>
    </div>
  </header>
  <main>
    <div id="servers-list">
      <div class="state-block">
        <p class="blink">Querying servers&hellip;</p>
      </div>
    </div>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
